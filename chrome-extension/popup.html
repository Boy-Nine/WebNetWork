<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Capture</title>
  <style>
    :root{--primary:#3b82f6;--primary-2:#2563eb;--accent:#06b6d4;--text:#0f172a;--muted:#64748b;--card:rgba(255,255,255,.86);--border:rgba(226,232,240,.9);--shadow:0 8px 24px rgba(0,0,0,.12);--ease:cubic-bezier(.4,0,.2,1)}
    @media (prefers-color-scheme:dark){:root{--text:#f8fafc;--muted:#94a3b8;--card:rgba(15,23,42,.86);--border:rgba(51,65,85,.8);--shadow:0 18px 42px rgba(0,0,0,.36)}}
    *{box-sizing:border-box}body{width:320px;margin:0;padding:16px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 0,rgba(59,130,246,.22),transparent 34%),radial-gradient(circle at 100% 20%,rgba(6,182,212,.18),transparent 30%),#f8fafc}.panel{border:1px solid var(--border);border-radius:22px;background:var(--card);box-shadow:var(--shadow);backdrop-filter:blur(12px);padding:18px;animation:enter .24s var(--ease) both}.head{display:flex;align-items:center;gap:12px}.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;display:grid;place-items:center;font-weight:900;box-shadow:0 12px 26px rgba(59,130,246,.34)}h1{font-size:18px;margin:0}.sub{margin:3px 0 0;color:var(--muted);font-size:12px}.hero{margin:18px 0;padding:14px;border-radius:16px;background:linear-gradient(135deg,rgba(59,130,246,.10),rgba(6,182,212,.08));border:1px solid var(--border);line-height:1.7;color:var(--muted);font-size:13px}.btn{width:100%;height:44px;border:0;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:white;font-weight:900;cursor:pointer;box-shadow:0 12px 24px rgba(59,130,246,.28);transition:transform .18s var(--ease),box-shadow .18s var(--ease)}.btn:hover{transform:translateY(-2px);box-shadow:0 16px 30px rgba(59,130,246,.34)}.btn:active{transform:scale(.97)}.tip{margin:12px 0 0;text-align:center;color:var(--muted);font-size:11px}@keyframes enter{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="panel">
    <div class="head"><div class="logo">A</div><div><h1>API Capture</h1><p class="sub">手动记录网页接口</p></div></div>
    <div class="hero">完整记录面板已升级为 Chrome 右侧边栏。打开后可持续记录页面翻页、搜索、点击产生的新接口，不会因为页面交互而关闭。</div>
    <button id="open" class="btn">打开右侧记录面板</button>
    <p class="tip">如果没有弹出，请在扩展管理页重新加载插件。</p>
  </div>
  <script>document.getElementById('open').onclick=()=>chrome.runtime.sendMessage({action:'openSidePanel'});</script>
</body>
</html>
